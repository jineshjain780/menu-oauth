<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Signing in…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #f8f9fa;
    }
    .card {
      text-align: center; padding: 40px 32px;
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      min-width: 280px;
    }
    .icon  { font-size: 44px; margin-bottom: 16px; }
    .title { font-size: 17px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
    .sub   { font-size: 13px; color: #888; line-height: 1.5; }
    .spinner {
      width: 32px; height: 32px; margin: 16px auto 0;
      border: 3px solid #e0e0e0; border-top-color: #4285F4;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #1a7f37; }
    .error   { color: #d32f2f; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🍽️</div>
    <div class="title" id="title">Completing sign-in…</div>
    <div class="sub"   id="sub">Please wait</div>
    <div class="spinner" id="spinner"></div>
  </div>

  <script>
  (function() {
    var RTDB = "https://menu-saas-15737-default-rtdb.firebaseio.com";

    var title   = document.getElementById("title");
    var sub     = document.getElementById("sub");
    var spinner = document.getElementById("spinner");

    function setStatus(t, s, ok) {
      title.textContent = t;
      title.className   = ok === true ? "title success" : ok === false ? "title error" : "title";
      sub.textContent   = s;
      if (ok !== undefined) spinner.style.display = "none";
    }

    // Parse URL hash (Google implicit flow puts token here)
    var hash   = window.location.hash.replace(/^#/, "");
    var search = window.location.search.replace(/^\?/, "");
    var raw    = hash || search;
    var params = new URLSearchParams(raw);

    var accessToken = params.get("access_token");
    var error       = params.get("error");
    // Google echoes back the 'state' param we set — this is our sessionKey
    var sessionKey  = params.get("state");

    if (!sessionKey) {
      setStatus("Missing session key", "Cannot complete sign-in. Please close and try again.", false);
      return;
    }

    if (error) {
      // Write error to RTDB so parent can detect it
      fetch(RTDB + "/oauth_tokens/" + sessionKey + ".json", {
        method : "PUT",
        headers: { "Content-Type": "application/json" },
        body   : JSON.stringify({ error: error }),
      }).then(function() {
        setStatus("Sign-in failed", error, false);
        setTimeout(function() { window.close(); }, 2000);
      });
      return;
    }

    if (!accessToken) {
      setStatus("No token received", "Please close this window and try again.", false);
      return;
    }

    // Write access_token to Firebase RTDB under the session key
    // The parent app is polling this endpoint and will pick it up within 800ms
    setStatus("Signing in…", "Sending credentials securely…");

    fetch(RTDB + "/oauth_tokens/" + sessionKey + ".json", {
      method : "PUT",
      headers: { "Content-Type": "application/json" },
      body   : JSON.stringify({
        accessToken: accessToken,
        ts         : Date.now(),
      }),
    })
    .then(function(r) {
      if (!r.ok) throw new Error("RTDB write failed: " + r.status);
      setStatus("✓ Signed in!", "This window will close automatically.", true);
      // Close after short delay so user sees success
      setTimeout(function() { window.close(); }, 1500);
    })
    .catch(function(e) {
      setStatus("Error", e.message + " — please close and try again.", false);
    });

  })();
  </script>
</body>
</html>
